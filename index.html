<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dein Name — Portfolio</title>
  <style>
    :root {
      --bg: #0f0f10;
      --text: #f5f5f5;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-image {
      width: 100%;
      max-width: 600px;
      height: auto;
      display: block;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    /* Platzhalter-Styling — kann entfernt werden, sobald ein echtes Bild eingebunden ist */
    .placeholder {
      width: 100%;
      max-width: 600px;
      aspect-ratio: 4 / 5;
      background: linear-gradient(135deg, #2a2a2d, #1a1a1c);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6b6b6f;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      padding: 24px;
    }

    @media (max-width: 600px) {
      .placeholder,
      .hero-image {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- PLATZHALTER: Sobald du ein Bild hast, ersetze diesen div-Block durch:
         <img src="dein-bild.jpg" alt="Beschreibung" class="hero-image">
    -->
    <div class="placeholder">
      Bild folgt<br>(Platzhalter)
    </div>
  </div>

</body>
</html>
